[graph]
all-features = true

[advisories]
version = 2
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate transitive versions are expected in the current CLI graph because
# crypto, TLS, PTY, and platform crates do not all move in lockstep. Keep this
# non-blocking so the security workflow fails on actionable risks.
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
