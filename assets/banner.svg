<svg width="600" height="172" viewBox="0 0 600 172" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="600" height="172" fill="#09090b"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="600" y2="40" stroke="#141418" stroke-width="1"/>
  <line x1="0" y1="80" x2="600" y2="80" stroke="#141418" stroke-width="1"/>
  <line x1="0" y1="120" x2="600" y2="120" stroke="#141418" stroke-width="1"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="#141418" stroke-width="1"/>
  <line x1="40"  y1="0" x2="40"  y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="80"  y1="0" x2="80"  y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="280" y1="0" x2="280" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="440" y1="0" x2="440" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="520" y1="0" x2="520" y2="172" stroke="#141418" stroke-width="1"/>
  <line x1="560" y1="0" x2="560" y2="172" stroke="#141418" stroke-width="1"/>

  <!-- Left accent strip -->
  <rect x="0" y="0" width="4" height="172" fill="#16a34a"/>

  <!-- Logo mark: green square, 4-cell grid -->
  <rect x="28" y="50" width="64" height="64" fill="#16a34a"/>
  <!-- TL: full white -->
  <rect x="38" y="60" width="22" height="22" fill="white"/>
  <!-- TR: half-opacity white -->
  <rect x="64" y="60" width="22" height="22" fill="white" fill-opacity="0.38"/>
  <!-- BL: half-opacity white -->
  <rect x="38" y="86" width="22" height="22" fill="white" fill-opacity="0.38"/>
  <!-- BR: full white -->
  <rect x="64" y="86" width="22" height="22" fill="white"/>

  <!-- Wordmark -->
  <text x="112" y="100"
        font-family="'JetBrains Mono', Consolas, 'Courier New', monospace"
        font-size="50"
        font-weight="700"
        fill="#f4f4f5"
        letter-spacing="-1.5">lockrail</text>

  <!-- Tagline -->
  <text x="114" y="128"
        font-family="'JetBrains Mono', Consolas, 'Courier New', monospace"
        font-size="11"
        fill="#52525b"
        letter-spacing="3">LOCAL SECRET FIREWALL FOR AI CODING TOOLS</text>

  <!-- Bottom accent strip -->
  <rect x="4" y="168" width="596" height="4" fill="#16a34a" fill-opacity="0.32"/>

</svg>
